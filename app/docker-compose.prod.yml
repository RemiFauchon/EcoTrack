# Déploiement production (VPS) — images optimisées + reverse proxy Caddy (HTTPS auto).
# Lancement : docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      MQTT_URL: mqtt://mosquitto:1883
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Vide = même origine : le front appelle /api et /socket.io, routés par Caddy.
        VITE_API_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      # Mode INTÉGRATION (un reverse proxy existe déjà sur le VPS) : on n'écoute que
      # sur localhost:WEB_PORT ; le proxy existant route un sous-domaine vers ce port.
      - "127.0.0.1:${WEB_PORT:-8088}:80"
      # Mode AUTONOME (rien sur 80/443) : commenter la ligne ci-dessus, décommenter celles-ci
      # et mettre DOMAIN=<votre FQDN> pour le HTTPS automatique :
      # - "80:80"
      # - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
